name: Auto Labels

on:
  pull_request:
    types: [opened, synchronize]
  issues:
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  labeler:
    name: PR Labeler
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml
          sync-labels: true

  auto-label-issues:
    name: Issue Labeler
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const issue = context.payload.issue;
            const labels = [];

            // Add triage label to new issues
            labels.push('triage');

            // Auto-detect scope from title
            const title = issue.title.toLowerCase();
            const body = (issue.body || '').toLowerCase();

            const scopePatterns = {
              'scope: dataview': ['dataview', 'tableview', 'listview', 'galleryview', 'boardview'],
              'scope: trpc': ['trpc', 'router', 'api'],
              'scope: db': ['database', 'drizzle', 'schema', 'migration'],
              'scope: shared': ['shared', 'parser', 'filter', 'sort'],
              'scope: ui': ['ui', 'shadcn', 'component'],
              'scope: web': ['web', 'frontend', 'next', 'nextjs'],
              'scope: server': ['server', 'hono', 'backend']
            };

            for (const [label, patterns] of Object.entries(scopePatterns)) {
              if (patterns.some(p => title.includes(p) || body.includes(p))) {
                labels.push(label);
              }
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labels
              });
            }
