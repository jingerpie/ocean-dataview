# yaml-language-server: $schema=http://json.schemastore.org/github-action.json

name: "Setup Tools"
description: Configure common tools for GitHub Actions workflows.

inputs:
  install:
    description: "Whether to install dependencies."
    required: false
    default: "true"
  frozen:
    description: "Freeze dependencies to avoid changes during installation."
    required: false
    default: "true"
  cache:
    description: "Whether to cache dependencies."
    required: false
    default: "true"
  working-directory:
    description: "The working directory to run commands in."
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Cache Bun dependencies
      if: ${{ inputs.cache == 'true' }}
      uses: actions/cache@v5
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install dependencies
      if: ${{ inputs.install == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.frozen == 'true' && 'bun install --frozen-lockfile' || 'bun install' }}
